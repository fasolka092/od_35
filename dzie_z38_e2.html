<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dziewulski Z38_E2</title>
</head>
<body>
    <div style="color: red; font-size: 1cm;">Dziewulski - Zadanie 38 - Przykład 2</div><br>
    <div style="color: green; font-size: 7mm;">
        Wyświetlenie szerokości i wysokości ekranu przy użyciu <b>screen.width</b>
        oraz <b>screen.height</b>:
    </div><br>
    <hr>
    <script>
        document.write("<div style='color:blue;font-size:36px;'>");
        document.write("screen.width = " + screen.width + " px<br>");
        document.write("screen.height = " + screen.height + " px<br>");
        document.write("</div>");
    </script>
    <hr>
    <div style="color: navy; font-size: 6mm;">
        screen.width &rarr; szerokość ekranu monitora w pikselach<br>
        screen.height &rarr; wysokość ekranu monitora w pikselach
    </div>
</body>
</html>
